name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Build ABI split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Collect build outputs
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/
          cp build/app/outputs/flutter-apk/app-*-release.apk dist/ || true
          cp build/app/outputs/bundle/release/app-release.aab dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app-release.apk
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
            dist/app-release.aab
