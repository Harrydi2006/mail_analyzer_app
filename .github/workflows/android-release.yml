name: Android Release Build

# 发版：在发布下一版前更新 pubspec.yaml 的 version，再推送标签，例如
#   git tag v0.2.0 -m "0.2.0"
#   git push origin v0.2.0
# 本工作流在 push tag v* 时构建并上传/发布到 GitHub Release；手动运行仅产出 Artifact。

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pubspec
        id: v
        run: |
          VER=$(grep -E '^\s*version:' pubspec.yaml | head -1 | sed -E 's/^\s*version:\s*//;s/\s*#.*//;s/\s+$//')
          if [ -z "$VER" ]; then echo "Could not read version"; exit 1; fi
          echo "pubspec_version=$VER" >> "$GITHUB_OUTPUT"
          echo "Pubspec version: $VER"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build universal release APK
        run: flutter build apk --release

      - name: Build ABI split release APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Android App Bundle
        run: flutter build appbundle --release

      - name: Collect build outputs
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/
          cp build/app/outputs/flutter-apk/app-*-release.apk dist/ || true
          cp build/app/outputs/bundle/release/app-release.aab dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} (pubspec ${{ steps.v.outputs.pubspec_version }})"
          body: |
            **pubspec 版本:** `${{ steps.v.outputs.pubspec_version }}`

            **标签:** `${{ github.ref_name }}`（建议与 `version` 中 name 段一致，如 `v0.2.0` 对应 `0.2.0+2` 中的 `0.2.0`）

            构建产物：通用 APK、分架构 APK、AAB。
          generate_release_notes: true
          files: |
            dist/app-release.apk
            dist/app-arm64-v8a-release.apk
            dist/app-armeabi-v7a-release.apk
            dist/app-x86_64-release.apk
            dist/app-release.aab
