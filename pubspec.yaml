name: mail_analyzer_app
description: Android client for Mail Analyzer system.
publish_to: "none"
# 发布流程：1) 更新本行 version 2) git tag vX.Y.Z 推送 3) GitHub Actions 打 release 并附 APK/AAB
# version 格式 name+build: name 对用户可见，build 为 Android versionCode
version: 0.2.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  firebase_core: ^3.15.2
  firebase_messaging: ^15.1.6
  jpush_flutter: ^2.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
